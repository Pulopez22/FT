<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Printed Fabric - Square Foot Printing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fff; overflow-y: auto; color: #000; }
        .heavy-italic { font-weight: 900; font-style: italic; text-transform: uppercase; letter-spacing: -0.05em; }
        .sidebar-fixed { width: 320px; height: calc(100vh - 73px); position: sticky; top: 73px; background: white; border-right: 1px solid #e5e7eb; flex-shrink: 0; overflow-y: auto; }
        .sidebar-item { font-size: 11px; font-weight: 900; text-transform: uppercase; color: #9ca3af; transition: all 0.2s; cursor: pointer; letter-spacing: 0.05em; }
        .sidebar-item:hover, .sidebar-item.active { color: #000; padding-left: 4px; }
        .sidebar-item.active { border-right: 3px solid #000; }
        .main-content-scroll { min-height: calc(100vh - 73px); flex-grow: 1; background-color: white; display: flex; flex-direction: column; }
        .product-card { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); border: 1px solid #f3f4f6; border-radius: 2rem; }
        .product-card:hover { transform: translateY(-5px); border-color: #000; box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.05); }
        .filter-btn { transition: all 0.3s ease; border: 1px solid #f3f4f6; color: #9ca3af; font-weight: 900; background: white; }
        .filter-btn.active { background-color: #000; color: #fff; border-color: #000; }
        #cart-sidebar { position: fixed; top: 0; right: 0; height: 100%; width: 100%; max-width: 450px; background: white; box-shadow: -10px 0 30px rgba(0,0,0,0.1); transform: translateX(100%); transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); z-index: 120; display: flex; flex-direction: column; }
        #cart-sidebar.open { transform: translateX(0); }
        #cart-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); z-index: 110; opacity: 0; pointer-events: none; transition: opacity 0.5s ease; }
        #cart-overlay.visible { opacity: 1; pointer-events: auto; }
        .logout-btn { color: #ef4444; font-size: 8px; font-weight: 900; cursor: pointer; text-decoration: underline; margin-left: 5px; }
        .wholesale-badge { display: inline-flex; align-items: center; background-color: #f0fdf4; color: #16a34a; padding: 6px 16px; border-radius: 9999px; font-size: 10px; font-weight: 900; letter-spacing: 0.02em; text-transform: uppercase; border: 1px solid #dcfce7; margin-top: 10px; }
    </style>
</head>
<body class="flex flex-col min-h-screen text-black">

    <nav class="border-b py-4 px-6 md:px-10 flex justify-between items-center sticky top-0 bg-white/95 backdrop-blur-md z-50 shadow-sm">
        <div class="flex items-center gap-8">
            <a href="../index.html" class="flex items-center group">
                <div class="bg-black p-2 rounded-lg shadow-xl transition-transform group-hover:scale-105">
                    <img src="../images/SquareFootPrinting-Logo-White-Text-Lrg-01-e1525129997491.jpg" alt="Logo" class="h-8 md:h-10 w-auto object-contain">
                </div>
            </a>
            <div class="hidden xl:flex gap-6 text-[10px] font-black uppercase text-gray-400 tracking-widest italic">
                <a href="../index.html" class="hover:text-black transition-colors">Wall Art</a>
                <a href="../Banners/banners.html" class="hover:text-black transition-colors">Banners</a>
                <a href="../Displays/displays.html" class="hover:text-black transition-colors">Displays</a>
                <a href="../Stickers/stickers.html" class="hover:text-black transition-colors">Stickers</a>
            </div>
        </div>
        <div class="flex gap-4 items-center">
    <div id="auth-container"></div>
    
    <button onclick="toggleCart()" class="relative text-black p-2">
        <i data-lucide="shopping-bag" class="w-6 h-6 text-black"></i>
        <span id="cart-dot" class="absolute top-1 right-1 w-2.5 h-2.5 bg-red-600 rounded-full border-2 border-white hidden"></span>
    </button>
    
    <a href="../track.html" class="hidden md:block text-[10px] font-black uppercase text-black hover:text-red-600 transition-colors border-b-2 border-black pb-0.5">
        Track Order
    </a>
</div>
    </nav>

    <div class="flex flex-row flex-grow w-full">
        <aside class="sidebar-fixed p-10 hidden lg:block">
            <h3 class="text-[10px] font-black uppercase mb-10 text-gray-300 tracking-[0.2em] border-b pb-4">Product Categories</h3>
            <ul class="space-y-5 text-[11px] font-bold text-gray-500 uppercase">
                <li class="sidebar-item cursor-pointer"><a href="../AdvertisingFlags/advertising-flags.html">Advertising Flags</a></li>
                <li class="sidebar-item cursor-pointer"><a href="../Banners/banners.html">Banners</a></li>
                <li class="sidebar-item cursor-pointer"><a href="../Displays/displays.html">Displays</a></li>
                <li class="sidebar-item cursor-pointer"><a href="../LargePrinting/largeprinting.html">Large Format</a></li>
                <li class="sidebar-item cursor-pointer active"><a href="printed-fabric.html">Printed Fabric</a></li>
                <li class="sidebar-item cursor-pointer"><a href="../Stickers/stickers.html">Stickers</a></li>
                <li class="sidebar-item cursor-pointer"><a href="../Rigid Signs/rigidsigns.html">Rigid Signs</a></li>
            </ul>
        </aside>

        <main class="main-content-scroll">
            <div class="p-12 flex-grow">
                <header class="mb-12">
                    <h1 class="text-5xl heavy-italic text-gray-900 mb-4 tracking-tighter italic leading-none">Printed Fabric</h1>
                    <div id="price-tier-badge"></div>
                    
                    <div class="relative w-full md:w-80 mt-8">
                        <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-300 w-4 h-4"></i>
                        <input type="text" id="product-search" oninput="handleSearch(this.value)" placeholder="Search products..." class="w-full pl-12 pr-4 py-3 bg-gray-50 border-none rounded-2xl text-xs font-bold focus:ring-2 focus:ring-black outline-none">
                    </div>
                </header>

                <div id="product-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 2xl:grid-cols-4 gap-8"></div>
            </div>

            <footer class="bg-white border-t py-16 px-10 text-center w-full mt-auto">
                <div class="bg-black p-3 rounded-xl inline-block mb-6 shadow-2xl">
                    <img src="../images/SquareFootPrinting-Logo-White-Text-Lrg-01-e1525129997491.jpg" alt="Logo" class="h-8 md:h-10 w-auto">
                </div>
                <p class="text-[10px] font-black text-gray-300 uppercase tracking-[0.4em]">© 2026 Square Foot Printing - Las Vegas</p>
            </footer>
        </main>
    </div>

    <div id="cart-sidebar">
        <div class="p-8 border-b border-gray-100 flex justify-between items-center bg-white sticky top-0 text-black">
            <div><h3 class="text-2xl font-black uppercase italic tracking-tighter">Your Bag</h3><p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mt-1" id="cart-count-text">0 items</p></div>
            <button onclick="toggleCart()" class="p-3 hover:bg-gray-50 rounded-2xl border border-gray-100"><i data-lucide="x" class="w-6 h-6"></i></button>
        </div>
        <div id="cart-items-container" class="flex-grow overflow-y-auto p-8 space-y-6 bg-white text-black"></div>
        <div class="p-8 bg-gray-50 border-t border-gray-100 space-y-6">
            <div class="flex justify-between items-end text-black"><span class="text-[10px] font-black uppercase text-gray-400 italic">Subtotal</span><span id="cart-total-price" class="text-4xl font-black italic tracking-tighter leading-none">$0.00</span></div>
            <button onclick="window.location.href='../checkout.html'" class="w-full bg-black text-white font-black py-6 rounded-[2rem] text-[12px] uppercase tracking-[0.3em] italic shadow-2xl hover:bg-red-600 transition-all text-center">Checkout</button>
        </div>
    </div>
    <div id="cart-overlay" onclick="toggleCart()"></div>

    <script src="../Banners/pricing.js"></script>
    <script src="../Displays/pricing.js"></script>
    <script src="../AdvertisingFlags/pricing.js"></script>
    <script src="../LargePrinting/pricing.js"></script>

    <script>
        lucide.createIcons();

        const products = [
            { id: 'wrinkle-free', category: 'fabric', name: 'Wrinkle Free Fabric', img: '../images/Banners/AMS-Fabric-6.png', desc: 'Polyester fabric with matte finishing.', url: '../Banners/fabric-banner.html' },
            { id: 'tension-fabric', name: 'Tension Fabric', img: '../images/Banners/TensionFabric-3.png', desc: 'Elastic fabric for trade show displays.', url: '../Banners/tensionfabric.html' },
            { id: 'blockout-fabric', name: 'Blockout Fabric', img: '../images/Banners/BlockOutFabric-1.png', desc: 'Opaque fabric prevents light pass-through.', url: '../Banners/blockoutFabric.html' },
            { id: 'custom-pole-flag', category: 'flags', name: 'Custom Pole Flag', img: '../images/Advertising Flags/Custom-Pole-Flag-02-1.png', desc: 'Durable 18oz vinyl for light poles.', url: '../AdvertisingFlags/pole-flag.html' },
            { id: 'teardrop-flag-pro', category: 'flags', name: 'Tear Drop Flag', img: '../images/Advertising Flags/TearDropFlags-Main.png', desc: 'Premium aerodynamic feather flag.', url: '../AdvertisingFlags/teardropflag.html' },
            { id: 'tensionstand', category: 'displays', name: 'EZ Tube Tension Stand', img: '../images/Displays/SQFT-120-EZ-Tube-Tension-Fabric-Stand-01_1200.png', desc: 'Aluminum composite for permanent outdoor signage.', url: '../Displays/tensionstand.html' },
            { id: 'stretchtable', category: 'displays', name: 'Stretch Table Cover', img: '../images/Displays/SQFT-6ft-Stretch-Table-Throw-01.png', desc: 'High-impact polycarbonate for durable signage.', url: '../Displays/stretchtable.html' }
        ];

        // FUNCIÓN DE AUTENTICACIÓN
        function checkAuth() {
            const userName = localStorage.getItem('userName');
            const isWholesale = (localStorage.getItem('userTier') === 'wholesale');
            const authContainer = document.getElementById('auth-container');
            const badgeContainer = document.getElementById('price-tier-badge');

            if (userName) {
                authContainer.innerHTML = `<div class="flex items-center whitespace-nowrap text-black"><span class="text-[10px] font-black uppercase italic border-b-2 border-red-600 pb-0.5">HI, ${userName.split(' ')[0]}</span><span onclick="logout()" class="logout-btn italic ml-2">LOGOUT</span></div>`;
                if (isWholesale) {
                    badgeContainer.innerHTML = `<div class="wholesale-badge">✓ Wholesale Enabled</div>`;
                } else {
                    badgeContainer.innerHTML = `<div class="mt-4 text-[9px] font-black uppercase px-4 py-2 bg-gray-100 text-gray-400 rounded-full w-fit italic border">Retail Pricing</div>`;
                }
            } else {
                authContainer.innerHTML = `<button onclick="window.location.href='../login.html'" class="text-[10px] font-black uppercase border-b-2 border-black pb-0.5 italic">Login</button>`;
                badgeContainer.innerHTML = `<div class="mt-4 text-[9px] font-black uppercase px-4 py-2 bg-gray-100 text-gray-400 rounded-full w-fit italic border text-black">Public Retail Prices</div>`;
            }
            renderProducts(products);
            renderCart();
        }

        function renderProducts(data) {
            const grid = document.getElementById('product-grid');
            const isWholesale = localStorage.getItem('userTier') === 'wholesale';
            const multiplier = isWholesale ? 1 : 2;

            grid.innerHTML = data.map(b => {
                let priceBase = 0;
                try {
                    if (window.bannerPricing && window.bannerPricing[b.id]) {
                        const p = window.bannerPricing[b.id];
                        if (b.id === 'stretchtable' && p.base) priceBase = p.base["6"];
                        else if (b.id === 'tensionstand' && p.matrix) priceBase = p.matrix["Small"].kit.no;
                        else priceBase = p.material || 0;
                    } 
                    if (priceBase === 0 && window.masterPricing && window.masterPricing[b.id]) {
                        const p = window.masterPricing[b.id];
                        priceBase = p.base || p["small-single-Printed Flag Only (No Hardware)-No"] || 0;
                    }
                    if (priceBase === 0 && window.largeFormatPricing && window.largeFormatPricing[b.id]) {
                        const p = window.largeFormatPricing[b.id];
                        priceBase = p.material || (p.sizes ? p.sizes[Object.keys(p.sizes)[0]] : 0);
                    }
                } catch (e) { console.error("Error precio:", b.id, e); }

                const finalPrice = priceBase * multiplier;

                return `
                    <div onclick="window.location.href='${b.url}'" class="product-card bg-white overflow-hidden cursor-pointer group shadow-sm border border-gray-100">
                        <div class="h-64 p-8 flex items-center justify-center group-hover:bg-gray-50 transition-colors relative">
                            ${!isWholesale ? '<span class="absolute top-6 right-6 bg-red-600 text-white text-[7px] font-black px-2 py-1 rounded-full uppercase italic shadow-lg">Retail</span>' : ''}
                            <img src="${b.img}" class="object-contain h-full drop-shadow-xl transition-transform group-hover:scale-105">
                        </div>
                        <div class="p-6 border-t">
                            <h3 class="font-black text-[11px] text-gray-800 uppercase italic h-8">${b.name}</h3>
                            <div class="flex justify-between items-center mt-6">
                                <p class="text-xl font-black text-gray-900 italic">
                                    ${finalPrice > 0 ? '$' + finalPrice.toFixed(2) : 'View Price'}
                                </p>
                                <div class="w-8 h-8 bg-black rounded-full flex items-center justify-center text-white">
                                    <i data-lucide="arrow-right" class="w-4 h-4"></i>
                                </div>
                            </div>
                        </div>
                    </div>`;
            }).join('');
            lucide.createIcons();
        }

        function toggleCart() {
            document.getElementById('cart-sidebar').classList.toggle('open');
            document.getElementById('cart-overlay').classList.toggle('visible');
            if (document.getElementById('cart-sidebar').classList.contains('open')) renderCart();
        }

        function renderCart() {
            const cart = JSON.parse(localStorage.getItem('sqft_cart')) || [];
            const container = document.getElementById('cart-items-container');
            container.innerHTML = '';
            let total = 0;

            if (cart.length === 0) {
                container.innerHTML = `<div class="text-center py-20 text-gray-300 font-black uppercase italic text-[11px]">Bag Empty</div>`;
                document.getElementById('cart-dot').classList.add('hidden');
            } else {
                document.getElementById('cart-dot').classList.remove('hidden');
                cart.forEach((item, i) => {
                    let pValue = 0;
                    if (item && item.price) {
                        pValue = typeof item.price === 'string' ? parseFloat(item.price.replace(/[$,]/g, '')) : item.price;
                    }
                    total += (pValue || 0);

                    container.innerHTML += `
                        <div class="flex gap-4 border-b border-gray-50 pb-6">
                            <img src="${item.image}" class="w-16 h-16 object-contain border rounded-lg">
                            <div class="flex-grow">
                                <div class="flex justify-between font-black uppercase italic text-xs text-black">
                                    <span>${item.name}</span>
                                    <button onclick="removeItem(${i})" class="text-gray-300 hover:text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                                </div>
                                <span class="text-lg font-black italic text-black">$${(pValue || 0).toFixed(2)}</span>
                            </div>
                        </div>`;
                });
            }
            document.getElementById('cart-total-price').innerText = `$${total.toLocaleString('en-US', {minimumFractionDigits: 2})}`;
            document.getElementById('cart-count-text').innerText = `${cart.length} Items`;
            lucide.createIcons();
        }

        function removeItem(i) {
            let cart = JSON.parse(localStorage.getItem('sqft_cart')) || [];
            cart.splice(i, 1);
            localStorage.setItem('sqft_cart', JSON.stringify(cart));
            renderCart();
        }

        function handleSearch(term) {
            const filtered = products.filter(p => p.name.toLowerCase().includes(term.toLowerCase()));
            renderProducts(filtered);
        }

        function logout() { localStorage.clear(); window.location.reload(); }

        window.onload = checkAuth;
    </script>
</body>
</html>
