<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rigid Signs - Square Foot Printing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fff; overflow-y: auto; }
        .heavy-italic { font-weight: 900; font-style: italic; text-transform: uppercase; letter-spacing: -0.05em; }
        .sidebar-fixed { width: 320px; height: calc(100vh - 73px); position: sticky; top: 73px; background: white; border-right: 1px solid #e5e7eb; flex-shrink: 0; overflow-y: auto; }
        .sidebar-item { font-size: 11px; font-weight: 900; text-transform: uppercase; color: #9ca3af; transition: all 0.2s; cursor: pointer; letter-spacing: 0.05em; }
        .sidebar-item:hover, .sidebar-item.active { color: #000; padding-left: 4px; }
        .sidebar-item.active { border-right: 3px solid #000; }
        .main-content-scroll { min-height: calc(100vh - 73px); flex-grow: 1; background-color: white; display: flex; flex-direction: column; }
        
        .product-card { 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            border: 1px solid #f3f4f6; 
            border-radius: 2rem; 
        }
        .product-card:hover { transform: translateY(-5px); border-color: #000; box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.05); }
        .filter-btn { transition: all 0.3s ease; border: 1px solid #f3f4f6; color: #9ca3af; font-weight: 900; }
        .filter-btn.active { background-color: #000; color: #fff; border-color: #000; }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <nav class="border-b py-4 px-6 md:px-10 flex justify-between items-center sticky top-0 bg-white/95 backdrop-blur-md z-50 shadow-sm">
        <div class="flex items-center gap-8">
            <a href="../index.html" class="flex items-center group">
                <div class="bg-black p-2 rounded-lg shadow-xl transition-transform group-hover:scale-105">
                    <img src="../images/SquareFootPrinting-Logo-White-Text-Lrg-01-e1525129997491.jpg" alt="Logo" class="h-8 md:h-10 w-auto">
                </div>
            </a>
            <div class="hidden xl:flex gap-6 text-[10px] font-black uppercase text-gray-400 tracking-widest">
                <a href="../index.html" class="hover:text-black transition-colors">Wall Art</a>
                <a href="../Banners/banners.html" class="hover:text-black transition-colors">Banners</a>
                <a href="#" class="hover:text-black transition-colors">Trade Show</a>
                <a href="#" class="hover:text-black transition-colors">Decals</a>
                <a href="../Stickers/stickers.html" class="hover:text-black font-bold transition-colors">Stickers</a>
                <a href="#" class="hover:text-black transition-colors">Apparel</a>
                <a href="#" class="hover:text-black transition-colors">Marketing Materials</a>
            </div>
        </div>
        <button class="bg-red-600 text-white px-6 py-2 rounded-full font-black uppercase text-[10px] tracking-widest shadow-lg hover:bg-red-700 transition-all">Register</button>
    </nav>

    <div class="flex flex-row flex-grow w-full">
        <aside class="sidebar-fixed p-10 hidden lg:block">
            <h3 class="text-[10px] font-black uppercase mb-10 text-gray-300 tracking-[0.2em] border-b pb-4">Product Categories</h3>
            <ul class="space-y-5 text-[11px] font-bold text-gray-500 uppercase">
                <li class="sidebar-item cursor-pointer"><a href="../AdvertisingFlags/advertising-flags.html" class="block w-full">Advertising Flags</a></li>
                <li class="sidebar-item cursor-pointer"><a href="../Banners/banners.html" class="block w-full">Banners</a></li>
                <li class="sidebar-item cursor-pointer">Displays</li>
                <li class="sidebar-item cursor-pointer"><a href="../LargePrinting/largeprinting.html" class="block w-full">Large Format Printing</a></li>
                <li class="sidebar-item cursor-pointer">Printed Fabric</li>
                <li class="sidebar-item cursor-pointer"><a href="../Stickers/stickers.html" class="block w-full">Stickers</a></li>
                <li class="sidebar-item cursor-pointer active"><a href="rigidsigns.html" class="block w-full">Rigid Signs</a></li>
            </ul>
        </aside>

        <main class="main-content-scroll">
            <div class="p-12 flex-grow">
                <header class="mb-12 space-y-8">
                    <div class="flex flex-col md:flex-row justify-between items-end gap-6">
                        <div>
                            <h1 class="text-5xl heavy-italic text-gray-900 mb-4 tracking-tighter italic leading-none">Rigid Signs</h1>
                            <div class="h-2 w-24 bg-black rounded-full"></div>
                        </div>
                        
                        <div class="relative w-full md:w-80">
                            <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-300 w-4 h-4"></i>
                            <input type="text" id="product-search" oninput="handleSearch(this.value)" placeholder="Search material..." class="w-full pl-12 pr-4 py-3 bg-gray-50 border-none rounded-2xl text-xs font-bold focus:ring-2 focus:ring-black transition-all">
                        </div>
                    </div>

                    <div class="flex flex-wrap gap-2 bg-white p-1.5 rounded-3xl border shadow-sm w-fit">
                        <button onclick="filterBy('all', this)" class="filter-btn active px-6 py-2 rounded-full text-[9px] uppercase tracking-widest">All Signs</button>
                        <button onclick="filterBy('foam', this)" class="filter-btn px-6 py-2 rounded-full text-[9px] uppercase tracking-widest">Foam & Lightweight</button>
                        <button onclick="filterBy('metal', this)" class="filter-btn px-6 py-2 rounded-full text-[9px] uppercase tracking-widest">Metal & Heavy Duty</button>
                        <button onclick="filterBy('plastic', this)" class="filter-btn px-6 py-2 rounded-full text-[9px] uppercase tracking-widest">Plastic & PVC</button>
                    </div>
                </header>

                <div id="product-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 2xl:grid-cols-4 gap-8">
                </div>
            </div>

            <footer class="bg-white border-t py-12 px-10 text-center w-full">
                <div class="bg-black p-2 rounded-lg inline-block mb-4 shadow-lg"><img src="../images/SquareFootPrinting-Logo-White-Text-Lrg-01-e1525129997491.jpg" alt="Logo" class="h-6 w-auto"></div>
                <p class="text-[9px] font-black text-gray-300 uppercase tracking-[0.3em]">© 2026 Square Foot Printing - Las Vegas</p>
            </footer>
        </main>
    </div>

    <script>
        const banners = [
            { name: 'PVC', cat: 'plastic', price: '$3.00 - $8.50 sq/ft', img: '../images/Rigid Signs/PVC-01.png', desc: 'Durable plastic for long-term indoor/outdoor use.', url: 'pvc.html' },
            { name: 'Foamboard', cat: 'foam', price: '$3.50 - $8.50 sq/ft', img: '../images/Rigid Signs/Foamboard-01.png', desc: 'Lightweight foam core for presentations and events.', url: 'foamboard.html' },
            { name: 'Coroplast', cat: 'plastic', price: '$3.50 - $8.50 sq/ft', img: '../images/Rigid Signs/Coroplast-01.png', desc: 'Fluted plastic perfect for yard and site signs.', url: 'coroplast.html' },
            { name: 'Styrene', cat: 'plastic', price: '$3.50 – $6.00 sq/ft', img: '../images/Rigid Signs/Styrene-01.png', desc: 'Thin, flexible plastic for frame inserts.', url: 'styrene.html' },
            { name: 'Aluminum Signs', cat: 'metal', price: '$4.50 - $14.00 sq/ft', img: '../images/Rigid Signs/Die-Bond-01.png', desc: 'Aluminum composite for permanent outdoor signage.', url: 'diebond.html' },
            { name: 'Ultraboard', cat: 'foam', price: '$5.00 - $9.50 sq/ft', img: '../images/Rigid Signs/UltraBoard-01.png', desc: 'Heavy-duty foam with a rigid plastic surface.', url: 'ultraboard.html' },
            { name: 'Acrylic Signs', cat: 'plastic', price: '$10.00 - $28.00 sq/ft', img: '../images/Rigid Signs/AB-Vinyl-Backlit-01.png', desc: 'Premium glass-like finish for lobby signs.', url: 'acrylic.html' },
            { name: 'Lexan Signs', cat: 'plastic', price: '$10.00 - $28.00 sq/ft', img: '../images/Rigid Signs/AB-Vinyl-Backlit-01.png', desc: 'High-impact polycarbonate for durable signage.', url: 'lexan.html' },
            { name: 'Acrylic Art', cat: 'specialty', price: '$25.00 – $35.00 sq/ft', img: '../images/Rigid Signs/SQFT-Acrylic-Art-02_600.png', desc: 'High-end photo prints on acrylic panels.', url: 'acrylicart.html' },
            { name: 'A-Frame', cat: 'specialty', price: '$95.67 – $230.20 unit', img: '../images/Rigid Signs/A-frame5.png', desc: 'Portable sidewalk signage with inserts.', url: 'aframe.html' }
        ];

        let currentFiltered = [...banners];

        function renderProducts(data) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = data.map(b => `
                <div onclick="window.location.href='${b.url}'" class="product-card bg-white overflow-hidden cursor-pointer group shadow-sm border border-gray-100">
                    <div class="h-64 p-8 flex items-center justify-center group-hover:bg-gray-50 transition-colors relative">
                        ${b.tags ? `<span class="absolute top-4 left-4 bg-black text-white text-[7px] font-black px-2 py-1 rounded-full uppercase italic tracking-widest">${b.tags.join(' & ')}</span>` : ''}
                        <img src="${b.img}" alt="${b.name}" class="object-contain h-full drop-shadow-xl transition-transform group-hover:scale-105">
                    </div>
                    <div class="p-6 border-t">
                        <h3 class="font-black text-xs text-gray-800 uppercase italic leading-tight h-8">${b.name}</h3>
                        <p class="text-[9px] text-gray-400 font-bold mt-1 uppercase tracking-tight">${b.desc}</p>
                        <div class="flex justify-between items-center mt-6">
                            <p class="text-xl font-black text-gray-900 italic leading-none">${b.price}</p>
                            <div class="w-8 h-8 bg-black rounded-full flex items-center justify-center group-hover:bg-red-600 transition-colors shadow-lg">
                                <i data-lucide="arrow-right" class="text-white w-4 h-4"></i>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function filterBy(cat, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFiltered = cat === 'all' 
                ? banners 
                : banners.filter(b => b.cat.toLowerCase() === cat.toLowerCase());
            renderProducts(currentFiltered);
        }

        function handleSearch(term) {
            const searchResults = banners.filter(b => b.name.toLowerCase().includes(term.toLowerCase()));
            renderProducts(searchResults);
        }

        window.onload = () => renderProducts(banners);
    </script>
</body>
</html>
