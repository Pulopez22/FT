<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Square Foot Printing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fff; overflow-x: hidden; color: #000; }
        .heavy-italic { font-weight: 900; font-style: italic; text-transform: uppercase; letter-spacing: -0.05em; }
        .admin-table { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
        .admin-table th { font-size: 10px; font-weight: 900; text-transform: uppercase; color: #9ca3af; letter-spacing: 0.1em; padding: 0 20px; text-align: left; }
        .order-row { background: white; border: 1px solid #f3f4f6; transition: all 0.3s ease; }
        .order-row:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); border-color: #000; }
        .order-row td { padding: 20px; font-size: 12px; border-top: 1px solid #f3f4f6; border-bottom: 1px solid #f3f4f6; }
        .order-row td:first-child { border-left: 1px solid #f3f4f6; border-top-left-radius: 1.5rem; border-bottom-left-radius: 1.5rem; }
        .order-row td:last-child { border-right: 1px solid #f3f4f6; border-top-right-radius: 1.5rem; border-bottom-right-radius: 1.5rem; }
        .status-badge { padding: 4px 12px; font-size: 9px; font-weight: 900; text-transform: uppercase; border-radius: 20px; }
        .status-pending { background: #fef3c7; color: #d90606; }
        .status-shipping { background: #e0f2fe; color: #0284c7; }
        .status-completed { background: #dcfce7; color: #16a34a; }
        #mobile-menu { position: fixed; inset: 0; background: white; z-index: 100; transform: translateX(-100%); transition: transform 0.3s ease-in-out; }
        #mobile-menu.open { transform: translateX(0); }
    </style>
</head>
<body class="bg-white text-black">

    <nav class="border-b py-4 px-6 md:px-10 flex justify-between items-center sticky top-0 bg-white/95 backdrop-blur-md z-50 shadow-sm">
        <div class="flex items-center gap-8">
            <button onclick="toggleMobileMenu()" class="xl:hidden p-1 text-black"><i data-lucide="menu" class="w-6 h-6"></i></button>
            <a href="index.html" class="flex items-center group">
                <div class="bg-black p-2 rounded-lg shadow-xl transition-transform group-hover:scale-105">
                    <img src="images/SquareFootPrinting-Logo-White-Text-Lrg-01-e1525129997491.jpg" alt="Logo" class="h-8 md:h-10 w-auto object-contain">
                </div>
            </a>
            <div class="hidden xl:flex gap-6 text-[10px] font-black uppercase text-black tracking-widest italic">
                <span class="border-b-2 border-red-600 pb-1 text-red-600">ADMIN PANEL</span>
                <a href="index.html" class="hover:text-red-600 transition-colors">View Store</a>
                
            </div>
        </div>
        <div class="flex gap-4 items-center italic font-black text-[10px]">
            <span id="admin-name">ADMIN</span>
            <button onclick="logout()" class="text-red-600 underline">LOGOUT</button>
        </div>
    </nav>

    <div class="flex">
        <aside class="w-72 border-r h-[calc(100vh-73px)] sticky top-[73px] p-8 hidden lg:block bg-white overflow-y-auto">
            <h3 class="text-[10px] font-black uppercase mb-8 text-gray-300 tracking-widest border-b pb-2">Management</h3>
            <ul class="space-y-5 text-[11px] font-bold text-gray-500 uppercase">
                <li class="sidebar-item cursor-pointer text-black font-black"><i data-lucide="layout-dashboard" class="w-4 h-4 inline mr-2"></i> Orders History</li>
                <li class="sidebar-item cursor-pointer hover:text-black transition-colors"><i data-lucide="tags" class="w-4 h-4 inline mr-2"></i> Edit Pricing</li>
                  <li class="sidebar-item cursor-pointer text-black"><a href="AdvertisingFlags/advertising-flags.html" class="block w-full">Advertising Flags</a></li>
                <li class="sidebar-item cursor-pointer text-black"><a href="Banners/banners.html" class="block w-full">Banners</a></li>
                <li class="sidebar-item cursor-pointer text-black"><a href="Displays/displays.html" class="block w-full">Displays</a></li>
                <li class="sidebar-item cursor-pointer text-black"><a href="LargePrinting/largeprinting.html" class="block w-full">Large Format Printing</a></li>
                <li class="sidebar-item cursor-pointer text-black"><a href="PrintedFabric/printed-fabric.html" class="block w-full">Printed Fabric</a></li>
                <li class="sidebar-item cursor-pointer text-black"><a href="Stickers/stickers.html" class="block w-full">Stickers</a></li>
                <li class="sidebar-item cursor-pointer text-black"><a href="Rigid Signs/rigidsigns.html" class="block w-full">Rigid Signs</a></li>
           
            </ul>
        </aside>

        <main class="flex-grow p-6 md:p-12">
            <header class="mb-12">
                <h1 class="text-4xl md:text-5xl heavy-italic text-gray-900 mb-4 tracking-tighter">Orders History</h1>
                <div class="h-2 w-24 bg-red-600 rounded-full mb-8"></div>
            </header>

            <div class="overflow-x-auto">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Order ID</th>
                            <th>Customer</th>
                            <th>Items</th>
                            <th>Total</th>
                            <th>Status</th>
                            <th>Date</th>
                        </tr>
                    </thead>
                    <tbody id="orders-tbody">
                        <tr><td colspan="6" class="text-center py-20 text-gray-400 italic">Fetching orders...</td></tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        (function verifyAccess() {
            const token = localStorage.getItem('token');
            const userStr = localStorage.getItem('user');
            if (!token || !userStr) { window.location.href = 'login.html'; return; }
            const user = JSON.parse(userStr);
            if (user.role !== 'admin') { alert("No access."); window.location.href = 'index.html'; return; }
            window.addEventListener('DOMContentLoaded', () => {
                document.getElementById('admin-name').innerText = `ADMIN: ${user.name.toUpperCase()}`;
            });
        })();

        lucide.createIcons();

        async function fetchOrders() {
            const token = localStorage.getItem('token');
            const tbody = document.getElementById('orders-tbody');
            try {
                const response = await fetch('https://ft-f34l.onrender.com/api/admin/orders', {
                    headers: { 'x-auth-token': token }
                });
                const orders = await response.json();
                
                if (orders.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="6" class="text-center py-20 text-gray-400">No orders found.</td></tr>`;
                    return;
                }

                tbody.innerHTML = orders.map(order => `
                    <tr class="order-row cursor-pointer" onclick="toggleDetails('details-${order._id}')">
                        <td class="font-black">#${order.order_id || order._id.substring(0,8)}</td>
                        <td>
                            <div class="font-bold uppercase">${order.customer_name}</div>
                            <div class="text-[10px] text-gray-400">${order.customer_email}</div>
                        </td>
                        <td class="text-gray-500 uppercase font-bold text-[10px]">
                            <span class="flex items-center gap-1">
                                ${order.order_items ? order.order_items.length : 0} Items <i data-lucide="chevron-down" class="w-3 h-3"></i>
                            </span>
                        </td>
                        <td class="text-lg font-black italic">$${order.total_price || '0.00'}</td>
                        <td>
                            <select onchange="event.stopPropagation(); updateStatus('${order._id}', this.value)" 
        class="status-badge ${getStatusClass(order.status)} outline-none cursor-pointer border-none bg-transparent font-black">
    <option value="Pending" ${order.status === 'Pending' ? 'selected' : ''}>RECEIVED</option>
    <option value="Printing" ${order.status === 'Printing' ? 'selected' : ''}>PRINTING</option>
    <option value="Shipping" ${order.status === 'Shipping' ? 'selected' : ''}>SHIPPING</option>
    <option value="Completed" ${order.status === 'Completed' ? 'selected' : ''}>COMPLETED</option>
</select>
                        </td>
                        <td class="text-gray-400 font-medium">${new Date(order.createdAt).toLocaleDateString()}</td>
                    </tr>
                    <tr id="details-${order._id}" class="hidden bg-gray-50/50">
                        <td colspan="6" class="p-6 border-x border-b rounded-b-[2rem]">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                ${order.order_items ? order.order_items.map(item => `
                                    <div class="flex gap-4 bg-white p-6 rounded-3xl border border-gray-100 shadow-sm">
                                       
                                        <div class="flex-grow">
    <div class="flex justify-between items-start mb-2">
        <h4 class="font-black text-xs uppercase italic">${item.name}</h4>
        <span class="text-[10px] font-black text-gray-400">$${item.price}</span>
    </div>
    
    <ul class="text-[9px] text-gray-500 font-bold uppercase space-y-1 mb-4">
        ${item.details ? item.details.split(/[|\n]/).map(d => d.trim()).filter(d => d).map(d => `
            <li class="flex items-start gap-1">
                <span class="text-red-600">•</span> ${d}
            </li>
        `).join('') : '<li>Standard Specs</li>'}
    </ul>

    <div class="flex gap-3">
        ${item.fileUrl ? `<a href="${item.fileUrl}" target="_blank" class="bg-black text-white px-4 py-2 rounded-xl text-[9px] font-black uppercase italic hover:bg-red-600 transition-colors">Download Art</a>` : ''}
    </div>
</div>
                                    </div>
                                `).join('') : ''}
                            </div>
                        </td>
                    </tr>
                `).join('');
                lucide.createIcons();
            } catch (err) {
                tbody.innerHTML = `<tr><td colspan="6" class="text-center py-20 text-red-500">Error connecting to server.</td></tr>`;
            }
        }

        async function updateStatus(orderId, newStatus) {
            const token = localStorage.getItem('token');
            try {
                const res = await fetch(`https://ft-f34l.onrender.com/api/admin/orders/${orderId}/status`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json', 'x-auth-token': token },
                    body: JSON.stringify({ status: newStatus })
                });
                if (res.ok) fetchOrders();
            } catch (e) { alert("Error updating status"); }
        }

        function getStatusClass(status) {
            if (status === 'Pending') return 'status-pending';
            if (status === 'Shipping') return 'status-shipping';
            if (status === 'Completed') return 'status-completed';
            return 'text-blue-600 bg-blue-50';
        }

        function toggleDetails(id) { document.getElementById(id).classList.toggle('hidden'); }
        function logout() { localStorage.clear(); window.location.href = 'login.html'; }
        function toggleMobileMenu() { document.getElementById('mobile-menu').classList.toggle('open'); }

        window.onload = fetchOrders;
    </script>
</body>
</html>
