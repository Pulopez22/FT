<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Square Foot Wrap & Print</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)), 
                        url('https://images.unsplash.com/photo-1611310263916-5bc314962271?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 100%;
            max-width: 420px;
            padding: 40px;
            border-radius: 32px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.3);
            text-align: center;
        }

        .logo-container {
            width: auto;
            max-width: 200px;
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-container img {
            max-width: 100%;
            height: auto;
            filter: drop-shadow(0 0 8px rgba(255,255,255,0.4));
        }

        h2 {
            font-size: 28px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 8px;
            letter-spacing: -1px;
        }

        .subtitle {
            font-size: 14px;
            color: rgba(255,255,255,0.7);
            margin-bottom: 25px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .input-group {
            text-align: left;
        }

        label {
            font-size: 11px;
            color: rgba(255,255,255,0.8);
            margin-left: 10px;
            margin-bottom: 4px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        input {
            width: 100%;
            height: 50px;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 0 20px;
            font-size: 16px;
            color: #fff;
            outline: none;
            transition: all 0.3s ease;
        }

        input::placeholder {
            color: rgba(255,255,255,0.4);
        }

        input:focus {
            background: rgba(255, 255, 255, 0.25);
            border-color: #fff;
        }

        .btn-register {
            width: 100%;
            height: 54px;
            background-color: #fff;
            color: #000;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: transform 0.2s ease, background 0.3s;
        }

        .btn-register:hover {
            background-color: #f5f5f5;
            transform: translateY(-2px);
        }

        .btn-register:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .message {
            padding: 12px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 15px;
            display: none;
        }

        .error {
            background: rgba(255, 107, 107, 0.15);
            color: #ff6b6b;
            border: 1px solid rgba(255, 107, 107, 0.3);
        }

        .success {
            background: rgba(46, 213, 115, 0.15);
            color: #2ed573;
            border: 1px solid rgba(46, 213, 115, 0.3);
        }

        .footer {
            margin-top: 25px;
            font-size: 14px;
            color: rgba(255,255,255,0.8);
        }

        .footer a {
            color: #fff;
            text-decoration: none;
            font-weight: 700;
        }

        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="glass-card">
    <div class="logo-container">
        <img src="images/SquareFootPrinting-Logo-White-Text-Lrg-01-e1525129997491.jpg" alt="Logo">
    </div>
    
    <h2>Create Account</h2>
    <p class="subtitle">Join the Square Foot Wrap community</p>
    
    <div id="statusMessage" class="message"></div>

    <form id="registerForm">
        <div class="input-group">
            <label>Full Name</label>
            <input type="text" id="name" placeholder="John Doe" required>
        </div>

        <div class="input-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="email@example.com" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Min. 6 characters" minlength="6" required>
        </div>

        <div class="input-group">
            <label>Wholesale Code (Optional)</label>
            <input type="text" id="inviteCode" placeholder="Enter code for special pricing">
        </div>

        <button type="submit" id="btnRegister" class="btn-register">REGISTER</button>
    </form>

    <div class="footer">
        Already have an account? <a href="checkout.html">Login here</a>
    </div>
</div>

<script>
    const API_URL = "https://ft-f34l.onrender.com/api/auth/register";

    const registerForm = document.getElementById('registerForm');
    const statusMessage = document.getElementById('statusMessage');
    const btnRegister = document.getElementById('btnRegister');

    registerForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        btnRegister.disabled = true;
        btnRegister.innerText = "PROCESSING...";
        statusMessage.style.display = "none";

        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const inviteCode = document.getElementById('inviteCode').value.trim(); // Limpiamos espacios aquí también

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, password, inviteCode }) 
            });

            const data = await response.json();

            if (data.success) {
                statusMessage.className = "message success";
                statusMessage.innerText = "Account created! Redirecting to checkout...";
                statusMessage.style.display = "block";

                // Guardamos en LocalStorage para usarlo en el Checkout
                localStorage.setItem('userName', name);
                localStorage.setItem('userEmail', email);
                localStorage.setItem('isWholesale', data.isWholesale); // Importante
                
                setTimeout(() => {
                    window.location.href = "checkout.html";
                }, 2000);
            } else {
                statusMessage.className = "message error";
                statusMessage.innerText = data.message || "Registration failed";
                statusMessage.style.display = "block";
                btnRegister.disabled = false;
                btnRegister.innerText = "REGISTER";
            }
        } catch (err) {
            console.error("Error:", err);
            statusMessage.className = "message error";
            statusMessage.innerText = "Connection error. Please try again.";
            statusMessage.style.display = "block";
            btnRegister.disabled = false;
            btnRegister.innerText = "REGISTER";
        }
    });
</script>

</body>
</html>
