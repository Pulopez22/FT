<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Square Foot Wrap & Print</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)), 
                        url('https://images.unsplash.com/photo-1611310263916-5bc314962271?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            padding: 20px; /* 4. Espacio para móviles */
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 100%;
            max-width: 420px;
            padding: 40px 30px; /* Ajustado para mejor adaptabilidad */
            border-radius: 32px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.3);
            text-align: center;
        }

        /* 4. RESPONSIVIDAD: Ajuste para pantallas pequeñas */
        @media (max-width: 480px) {
            .glass-card {
                padding: 30px 20px;
                border-radius: 24px;
            }
            h2 { font-size: 24px; }
        }

        .logo-container {
            max-width: 180px;
            margin: 0 auto 25px;
        }

        .logo-container img {
            max-width: 100%;
            height: auto;
            filter: drop-shadow(0 0 8px rgba(255,255,255,0.4));
        }

        h2 {
            font-size: 28px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 8px;
            letter-spacing: -1px;
        }

        .subtitle {
            font-size: 14px;
            color: rgba(255,255,255,0.7);
            margin-bottom: 35px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .input-group {
            text-align: left;
        }

        label {
            font-size: 10px;
            color: rgba(255,255,255,0.8);
            margin-left: 10px;
            margin-bottom: 6px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        input {
            width: 100%;
            height: 54px;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 0 20px;
            font-size: 16px;
            color: #fff;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus {
            background: rgba(255, 255, 255, 0.25);
            border-color: #fff;
        }

        .btn-login {
            width: 100%;
            height: 54px;
            background-color: #fff;
            color: #000;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            text-transform: uppercase;
            transition: transform 0.2s ease, background 0.3s;
        }

        .btn-login:hover {
            background-color: #f5f5f5;
            transform: translateY(-2px);
        }

        .error {
            color: #ff6b6b;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 15px;
            display: none;
            background: rgba(255, 107, 107, 0.15);
            padding: 12px;
            border-radius: 10px;
        }

        .footer {
            margin-top: 30px;
            font-size: 13px;
            color: rgba(255,255,255,0.8);
        }

        .footer a {
            color: #fff;
            text-decoration: none;
            font-weight: 700;
        }
    </style>
</head>
<body>

<div class="glass-card">
    <div class="logo-container">
        <img src="images/SquareFootPrinting-Logo-White-Text-Lrg-01-e1525129997491.jpg" alt="Logo">
    </div>
    
    <h2>Design your Ideas</h2>
    <p class="subtitle">Log in to manage your custom orders</p>
    
    <div id="errorMessage" class="error"></div>
    
    <form id="loginForm">
        <div class="input-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="your@email.com" required>
        </div>
        
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••" required>
        </div>
        
        <button type="submit" class="btn-login">LOGIN TO PANEL</button>
    </form>
    
    <div class="footer">
        New here? <a href="register.html">Create your account</a>
    </div>
</div>

<script>
    const API_URL = "https://ft-f34l.onrender.com/api/auth/login";

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        // Dentro del addEventListener en login.html
const email = document.getElementById('email').value.trim().toLowerCase();
const password = document.getElementById('password').value.trim();
        const errorMsg = document.getElementById('errorMessage');
        const submitBtn = e.target.querySelector('.btn-login');

        // Estado de carga
        submitBtn.innerText = "VERIFYING...";
        submitBtn.disabled = true;
        errorMsg.style.display = 'none';

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const data = await response.json();

            if (data.success) {
                // --- 1, 2 y 5. GUARDAR DATOS DE SESIÓN Y AUTORIZACIÓN ---
                localStorage.setItem('token', data.token);
                localStorage.setItem('userName', data.user.name);
                localStorage.setItem('userEmail', data.user.email);

                // Detectamos si el servidor dice que es mayorista
                // Guardamos 'wholesale' para reducir precio a la mitad o 'retail' para duplicarlo
                const tier = data.user.isWholesale ? 'wholesale' : 'retail';
                localStorage.setItem('userTier', tier);
                
                // Redirigir a la tienda
                window.location.href = "checkout.html"; 
            } else {
                errorMsg.style.display = 'block';
                errorMsg.innerText = data.message || "Invalid credentials.";
                submitBtn.innerText = "LOGIN TO PANEL";
                submitBtn.disabled = false;
            }
        } catch (err) {
            errorMsg.style.display = 'block';
            errorMsg.innerText = "Connection error. Please try again.";
            submitBtn.innerText = "LOGIN TO PANEL";
            submitBtn.disabled = false;
        }
    });
</script>

</body>
</html>
