<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Square Foot Printing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="lucide.js"></script> <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fff; overflow-y: auto; }
        .heavy-italic { font-weight: 900; font-style: italic; text-transform: uppercase; letter-spacing: -0.05em; }
        .sidebar-fixed { width: 320px; height: calc(100vh - 73px); position: sticky; top: 73px; background: white; border-right: 1px solid #e5e7eb; flex-shrink: 0; overflow-y: auto; }
        .sidebar-item { font-size: 11px; font-weight: 900; text-transform: uppercase; color: #9ca3af; transition: all 0.2s; cursor: pointer; letter-spacing: 0.05em; }
        .sidebar-item:hover, .sidebar-item.active { color: #000; padding-left: 4px; }
        .sidebar-item.active { border-right: 3px solid #000; }
        .main-content-scroll { min-height: calc(100vh - 73px); flex-grow: 1; background-color: white; display: flex; flex-direction: column; }
        .custom-input { width: 100%; padding: 1.25rem; border-radius: 1.5rem; border: 1px solid #f3f4f6; font-weight: 700; outline: none; background: #f9fafb; transition: all 0.3s; }
        .custom-input:focus { border-color: #000; background: #fff; box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
        #checkout-sidebar { width: 450px; height: calc(100vh - 73px); position: sticky; top: 73px; border-left: 1px solid #e5e7eb; background: white; display: flex; flex-direction: column; }
    </style>
</head>
<body class="flex flex-col min-h-screen text-black">

    <nav class="border-b py-4 px-6 md:px-10 flex justify-between items-center sticky top-0 bg-white/95 backdrop-blur-md z-50 shadow-sm">
        <div class="flex items-center gap-8">
            <a href="index.html" class="flex items-center group">
                <div class="bg-black p-2 rounded-lg shadow-xl transition-transform group-hover:scale-105">
                    <img src="images/SquareFootPrinting-Logo-White-Text-Lrg-01-e1525129997491.jpg" alt="Logo" class="h-8 md:h-10 w-auto">
                </div>
            </a>
            <div class="hidden xl:flex gap-6 text-[10px] font-black uppercase text-gray-400 tracking-widest italic">
                <a href="index.html" class="hover:text-black">Wall Art</a>
                <a href="Banners/banners.html" class="hover:text-black">Banners</a>
                <a href="Stickers/stickers.html" class="hover:text-black">Stickers</a>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <button class="text-[10px] font-black uppercase text-black hover:text-red-600 border-b-2 border-black pb-0.5">Track My Order</button>
        </div>
    </nav>

    <div class="flex flex-row flex-grow w-full">
        <aside class="sidebar-fixed p-10 hidden lg:block text-black">
            <h3 class="text-[10px] font-black uppercase mb-10 text-gray-300 tracking-[0.2em] border-b pb-4">Checkout Process</h3>
            <ul class="space-y-5 text-[11px] font-bold text-gray-500 uppercase">
                <li class="sidebar-item active">1. Shipping Info</li>
                <li class="sidebar-item">2. Payment Method</li>
                <li class="sidebar-item">3. Final Review</li>
            </ul>
        </aside>

        <main class="main-content-scroll text-black">
            <div class="p-12 flex-grow">
                <header class="mb-12">
                    <h1 class="text-5xl heavy-italic text-gray-900 mb-4 italic leading-none tracking-tighter">Review Your Order</h1>
                    <div class="h-2 w-24 bg-black rounded-full"></div>
                </header>

                <div class="max-w-3xl space-y-12">
                    <section class="space-y-6">
                        <h2 class="text-[10px] font-black uppercase tracking-[0.2em] text-gray-400">Customer Details</h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <input type="text" id="cust-name" placeholder="FULL NAME" class="custom-input">
                            <input type="email" id="cust-email" placeholder="EMAIL ADDRESS" class="custom-input">
                            <input type="tel" id="cust-phone" placeholder="PHONE NUMBER" class="custom-input md:col-span-2">
                            <textarea id="cust-address" placeholder="FULL SHIPPING ADDRESS (STREET, CITY, ZIP)" class="custom-input md:col-span-2 h-32"></textarea>
                        </div>
                    </section>

                    <section class="space-y-6">
                        <h2 class="text-[10px] font-black uppercase tracking-[0.2em] text-gray-400">Payment Preview</h2>
                        <div class="flex gap-4 p-8 border rounded-[2rem] border-gray-100 bg-gray-50/50 items-center">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/b/b5/PayPal.svg" class="h-6 grayscale opacity-50">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/Visa_Inc._logo.svg" class="h-4 grayscale opacity-50">
                            <p class="text-[9px] font-bold text-gray-400 uppercase italic ml-auto">Payment link will be sent to email</p>
                        </div>
                    </section>

                    <section class="rounded-[2.5rem] overflow-hidden border-4 border-black h-64 shadow-2xl grayscale contrast-125">
                        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3222.18204618778!2d-115.1764673!3d36.1365403!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x80c8c38676d9178d%3A0xc00867858c2f1e!2sLas%20Vegas%20Premium%20Outlets%20North!5e0!3m2!1sen!2sus!4v1700000000000" class="w-full h-full border-0"></iframe>
                    </section>
                </div>
            </div>

            <footer class="bg-white border-t py-16 px-10 text-center w-full">
                <div class="bg-black p-3 rounded-xl inline-block mb-6 shadow-2xl"><img src="images/SquareFootPrinting-Logo-White-Text-Lrg-01-e1525129997491.jpg" alt="Logo" class="h-8 w-auto"></div>
                <p class="text-[10px] font-black text-gray-300 uppercase tracking-[0.4em]">© 2026 Square Foot Printing - Las Vegas</p>
            </footer>
        </main>

        <aside id="checkout-sidebar" class="hidden xl:flex">
            <div class="p-8 border-b border-gray-100 bg-white w-full">
                <h3 class="text-2xl font-black uppercase italic tracking-tighter">Your Summary</h3>
                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mt-1" id="order-count">0 Items</p>
            </div>
            <div id="summary-items" class="flex-grow overflow-y-auto p-8 space-y-8 bg-white"></div>
            <div class="p-8 bg-gray-50 border-t border-gray-100 space-y-6">
                <div class="flex justify-between items-end"><span class="text-[10px] font-black uppercase text-gray-400 tracking-[0.2em] mb-1">Total Due</span><span id="final-total" class="text-4xl font-black italic tracking-tighter text-black leading-none">$0.00</span></div>
                <button onclick="placeOrder()" id="order-btn" class="w-full bg-black text-white font-black py-6 rounded-[2rem] text-[12px] uppercase tracking-[0.3em] italic shadow-2xl hover:bg-red-600 transition-all">Send Order Now</button>
            </div>
        </aside>
    </div>

    <script>
        lucide.createIcons();

        function loadItems() {
            const cart = JSON.parse(localStorage.getItem('sqft_cart')) || [];
            const container = document.getElementById('summary-items');
            let total = 0;

            if (cart.length === 0) {
                container.innerHTML = `<div class="text-center py-20 text-gray-300 font-black uppercase text-[10px] italic">Your cart is empty</div>`;
                return;
            }

            container.innerHTML = cart.map(item => {
                const priceNum = typeof item.price === 'string' ? parseFloat(item.price.replace(/[$,]/g, '')) : item.price;
                total += priceNum;
                const details = item.options ? Object.entries(item.options).map(([k, v]) => `${k}: ${v}`).join(' | ') : (item.specs || "Custom Order");

                return `
                <div class="flex gap-4 border-b border-gray-50 pb-6 last:border-0">
                    <div class="w-20 h-20 bg-gray-50 rounded-2xl border flex items-center justify-center p-2 overflow-hidden">
                        <img src="${item.image}" class="max-w-full max-h-full object-contain">
                    </div>
                    <div class="flex-grow">
                        <h4 class="text-[11px] font-black uppercase italic tracking-tighter leading-tight">${item.name}</h4>
                        <p class="text-[9px] text-gray-400 font-bold uppercase mt-1 leading-tight">${details}</p>
                        <p class="text-lg font-black italic mt-3 text-right">$${priceNum.toFixed(2)}</p>
                    </div>
                </div>`;
            }).join('');

            document.getElementById('final-total').innerText = `$${total.toFixed(2)}`;
            document.getElementById('order-count').innerText = `${cart.length} Items`;
        }

        async function placeOrder() {
            const btn = document.getElementById('order-btn');
            const cart = JSON.parse(localStorage.getItem('sqft_cart')) || [];
            const name = document.getElementById('cust-name').value;
            const email = document.getElementById('cust-email').value;

            if(!name || !email || cart.length === 0) { 
                alert("Please complete the form and ensure your cart is not empty."); 
                return; 
            }

            btn.innerText = "SENDING...";
            btn.disabled = true;

            // Formato de datos optimizado para el server.js
            const orderData = {
                customer: { 
                    name, email, 
                    phone: document.getElementById('cust-phone').value, 
                    address: document.getElementById('cust-address').value 
                },
                items: cart.map(i => ({ 
                    product: i.name, 
                    price: i.price, 
                    details: i.options ? Object.entries(i.options).map(([k,v]) => `${k}: ${v}`).join(', ') : (i.specs || "No details")
                })),
                total: document.getElementById('final-total').innerText
            };

            try {
                // Forzamos modo CORS para evitar el bloqueo del navegador
                const res = await fetch('https://ft-f34l.onrender.com/api/place-order', {
                    method: 'POST',
                    mode: 'cors',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(orderData)
                });

                if(res.ok) { 
                    alert("Success! Your order has been received."); 
                    localStorage.removeItem('sqft_cart'); 
                    window.location.href = "index.html"; 
                } else {
                    throw new Error("Server Error 500");
                }
            } catch (e) { 
                // Error 500 o fallo de conexión
                alert("Server error 500 or Connection Failed. Ensure Render is Live and check Logs."); 
            } finally { 
                btn.innerText = "Send Order Now"; 
                btn.disabled = false; 
            }
        }

        window.onload = loadItems;
    </script>
</body>
</html>
