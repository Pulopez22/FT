<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Square Foot Printing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fff; color: #000; overflow-x: hidden; }.heavy-italic { font-weight: 900; font-style: italic; text-transform: uppercase; letter-spacing: -0.05em; }
        .input-field { width: 100%; padding: 1rem; border-radius: 1.25rem; border: 1px solid #e5e7eb; outline: none; transition: all 0.3s; font-size: 14px; font-weight: 600; background-color: #f9fafb; color: #000; }
        .input-field:focus { border-color: #000; background-color: #fff; box-shadow: 0 0 0 4px rgba(0,0,0,0.05); }
        .input-error { border-color: #ef4444 !important; background-color: #fef2f2 !important; }
        .input-error::placeholder { color: #ef4444 !important; font-weight: 700; }
        label { font-size: 10px; font-weight: 900; text-transform: uppercase; color: #9ca3af; letter-spacing: 0.1em; margin-bottom: 0.6rem; display: block; margin-left: 0.5rem; }
        .sidebar-item { font-size: 11px; font-weight: 900; text-transform: uppercase; color: #9ca3af; transition: all 0.2s; cursor: pointer; letter-spacing: 0.05em; }
        .sidebar-item:hover { color: #000; padding-left: 4px; }
        .payment-card { cursor: pointer; transition: all 0.3s ease; border: 2px solid #f3f4f6; border-radius: 1.5rem; padding: 1.5rem; display: flex; align-items: center; gap: 1rem; }
        .payment-card.active { border-color: #000; background-color: #fff; shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        #cardNumberDisplay { font-family: monospace; letter-spacing: 2px; font-size: 16px; }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <nav class="border-b py-4 px-6 md:px-10 flex justify-between items-center sticky top-0 bg-white/95 backdrop-blur-md z-50">
        <div class="flex items-center gap-8">
            <a href="index.html" class="bg-black p-2 rounded-lg shadow-xl"><img src="images/SquareFootPrinting-Logo-White-Text-Lrg-01-e1525129997491.jpg" alt="Logo" class="h-10 w-auto"></a>
        </div>
        <div class="flex items-center gap-4">
            <button onclick="window.location.href='index.html'" class="relative p-2"><i data-lucide="shopping-bag"></i></button>
        </div>
    </nav>

    <div class="flex flex-row flex-grow w-full">
        <main class="flex-grow bg-white p-6 md:p-12 overflow-y-auto">
            <div class="max-w-6xl mx-auto text-black">
                <header class="mb-12">
                    <h1 class="text-5xl heavy-italic italic tracking-tighter leading-none">Review Your Order</h1>
                    <div class="h-2 w-24 bg-red-600 rounded-full mt-4"></div>
                </header>

                <div class="grid grid-cols-1 lg:grid-cols-12 gap-16">
                    <div class="lg:col-span-7 space-y-12">
                        <section>
                            <h2 class="heavy-italic text-2xl mb-8 flex items-center gap-3"><i data-lucide="user" class="text-red-600"></i> Contact Information</h2>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div><label>Full Name</label><input type="text" id="fullName" placeholder="John Doe" class="input-field"></div>
                                <div><label>Email Address</label><input type="email" id="emailAddress" placeholder="john@example.com" class="input-field"></div>
                                <div class="md:col-span-2"><label>Phone Number</label><input type="tel" id="phoneNumber" placeholder="(702) 000-0000" class="input-field"></div>
                            </div>
                        </section>

                        <section class="space-y-8">
                            <h2 class="heavy-italic text-2xl mb-2 flex items-center gap-3"><i data-lucide="truck" class="text-red-600"></i> Delivery Method</h2>
                            <div class="flex gap-4">
                                <button onclick="setMethod('pickup')" id="method-pickup" class="flex-1 border-2 border-black p-6 rounded-[1.5rem] bg-black text-white flex flex-col items-center gap-2 shadow-xl">
                                    <i data-lucide="package"></i><span class="heavy-italic text-sm">Local Pickup</span>
                                </button>
                                <button onclick="setMethod('shipping')" id="method-shipping" class="flex-1 border-2 border-gray-100 p-6 rounded-[1.5rem] bg-white flex flex-col items-center gap-2">
                                    <i data-lucide="send"></i><span class="heavy-italic text-sm">Shipping</span>
                                </button>
                            </div>
                        </section>

                        <section class="space-y-8">
                            <h2 class="heavy-italic text-2xl mb-2 flex items-center gap-3"><i data-lucide="credit-card" class="text-red-600"></i> Payment Method</h2>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div onclick="selectPayment('card')" id="pay-card" class="payment-card bg-gray-50">
                                    <i data-lucide="credit-card"></i><span class="heavy-italic text-sm">Credit Card</span>
                                </div>
                                <div onclick="selectPayment('zelle')" id="pay-zelle" class="payment-card bg-gray-50">
                                    <i data-lucide="wallet"></i><span class="heavy-italic text-sm">Zelle</span>
                                </div>
                            </div>
                        </section>
                    </div>

                    <div class="lg:col-span-5">
                        <div class="bg-white rounded-[2.5rem] border border-gray-100 shadow-2xl overflow-hidden sticky top-6">
                            <div class="p-8 border-b border-gray-50 bg-gray-50/50"><h2 class="heavy-italic text-xl">Order Summary</h2></div>
                            <div id="order-items-list" class="p-8 space-y-6 max-h-[400px] overflow-y-auto"></div>
                            <div class="p-8 bg-gray-50 border-t border-gray-100 space-y-6 text-black">
                                <div class="flex justify-between items-end"><span class="text-[10px] font-black uppercase text-gray-400 italic">Total Amount</span><span id="final-price-display" class="text-5xl heavy-italic italic">$0.00</span></div>
                                <button id="submitOrderBtn" onclick="validateAndPlaceOrder(event)" class="w-full bg-red-600 hover:bg-black text-white font-black py-6 rounded-2xl text-[12px] uppercase tracking-[0.3em] italic transition-all shadow-xl shadow-red-100">Place Order Now</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        lucide.createIcons();
        let currentMethod = 'pickup', currentPayment = '', realDigits = "";

        function setMethod(type) {
            currentMethod = type;
            document.getElementById('method-pickup').className = type === 'pickup' ? "flex-1 border-2 border-black p-6 rounded-[1.5rem] bg-black text-white flex flex-col items-center gap-2 shadow-xl" : "flex-1 border-2 border-gray-100 p-6 rounded-[1.5rem] bg-white text-black flex flex-col items-center gap-2";
            document.getElementById('method-shipping').className = type === 'shipping' ? "flex-1 border-2 border-black p-6 rounded-[1.5rem] bg-black text-white flex flex-col items-center gap-2 shadow-xl" : "flex-1 border-2 border-gray-100 p-6 rounded-[1.5rem] bg-white text-black flex flex-col items-center gap-2";
        }

        function selectPayment(method) {
            currentPayment = method;
            document.getElementById('pay-card').classList.toggle('active', method === 'card');
            document.getElementById('pay-zelle').classList.toggle('active', method === 'zelle');
        }

        async function validateAndPlaceOrder(e) {
            e.preventDefault();
            const btn = document.getElementById('submitOrderBtn');
            const fields = ['fullName', 'emailAddress', 'phoneNumber'];
            
            let isValid = true;
            fields.forEach(id => {
                const el = document.getElementById(id);
                if (!el.value.trim()) { el.classList.add('input-error'); isValid = false; }
                else { el.classList.remove('input-error'); }
            });

            if (!isValid || !currentPayment) { alert("Please complete all fields and select payment."); return; }

            const cart = JSON.parse(localStorage.getItem('sqft_cart')) || [];
            
            // PREPARAR FORMDATA PARA NODE.JS
            const formData = new FormData();
            const orderInfo = {
                customer_name: document.getElementById('fullName').value,
                customer_email: document.getElementById('emailAddress').value,
                customer_phone: document.getElementById('phoneNumber').value,
                total_price: document.getElementById('final-price-display').innerText,
                delivery_method: currentMethod,
                payment_method: currentPayment
            };

            formData.append('data', JSON.stringify(orderInfo));

            // Convertimos las imágenes Base64 del carrito a archivos reales (Blob)
            for (let item of cart) {
                if (item.image && item.image.startsWith('data:')) {
                    const res = await fetch(item.image);
                    const blob = await res.blob();
                    formData.append('files', blob, `${item.name.replace(/\s+/g, '_')}.png`);
                }
            }

            try {
                btn.innerText = "PROCESSING...";
                btn.disabled = true;

                // Enviamos a tu servidor local
                const response = await fetch('https://ft-f34l.onrender.com/api/place-order', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    localStorage.removeItem('sqft_cart');
                    window.location.href = 'order.html'; 
                } else {
                    alert("Error in server. Make sure 'node server.js' is running.");
                }
            } catch (err) {
                console.error(err);
                alert("Connection failed. Check your terminal.");
            } finally {
                btn.innerText = "PLACE ORDER NOW";
                btn.disabled = false;
            }
        }

        function loadCheckoutData() {
            const cart = JSON.parse(localStorage.getItem('sqft_cart')) || [];
            const container = document.getElementById('order-items-list');
            let total = 0;
            container.innerHTML = cart.map(item => {
                total += parseFloat(item.price);
                return `<div class="flex gap-4 border-b pb-4 text-black"><div class="w-16 h-16 bg-white border rounded-xl p-2 flex-shrink-0"><img src="${item.image}" class="w-full h-full object-contain"></div><div class="flex-grow font-black text-xs uppercase italic">${item.name}</div><div>$${parseFloat(item.price).toFixed(2)}</div></div>`;
            }).join('');
            document.getElementById('final-price-display').innerText = `$${total.toFixed(2)}`;
        }
        window.onload = loadCheckoutData;
    </script>
</body>
</html>
