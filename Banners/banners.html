<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banners - Square Foot Printing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        /* Estructura fija para Sidebar e independiente para contenido */
        body { font-family: 'Inter', sans-serif; background-color: #fff; overflow: hidden; }
        .heavy-italic { font-weight: 900; font-style: italic; text-transform: uppercase; letter-spacing: -0.05em; }
        
        .sidebar-fixed { 
            width: 320px; height: calc(100vh - 73px); position: sticky; top: 73px; 
            background: white; border-right: 1px solid #e5e7eb; flex-shrink: 0; overflow-y: auto;
        }

        .sidebar-item { font-size: 11px; font-weight: 900; text-transform: uppercase; color: #9ca3af; transition: all 0.2s; cursor: pointer; letter-spacing: 0.05em; }
        .sidebar-item:hover, .sidebar-item.active { color: #000; padding-left: 4px; }
        .sidebar-item.active { border-right: 3px solid #000; }

        .main-content-scroll { 
            height: calc(100vh - 73px); overflow-y: auto; flex-grow: 1;
            background-color: white; display: flex; flex-direction: column;
        }

        .product-card { 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            border: 1px solid #f3f4f6; 
            border-radius: 2.5rem; 
        }
        .product-card:hover { 
            transform: scale(1.02) translateY(-5px); 
            box-shadow: 0 25px 30px -10px rgb(0 0 0 / 0.1);
            border-color: #000;
        }

        .filter-btn { transition: all 0.3s ease; border: 1px solid #f3f4f6; }
        .filter-btn.active { background-color: #000; color: #fff; border-color: #000; }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <nav class="border-b py-4 px-6 md:px-10 flex justify-between items-center sticky top-0 bg-white/95 backdrop-blur-md z-50 shadow-sm">
        <div class="flex items-center gap-8">
            <a href="../index.html" class="flex items-center group">
                <div class="bg-black p-2 rounded-lg shadow-xl transition-transform group-hover:scale-105">
                    <img src="../images/SquareFootPrinting-Logo-White-Text-Lrg-01-e1525129997491.jpg" alt="Logo" class="h-8 md:h-10 w-auto">
                </div>
            </a>
            <div class="hidden xl:flex gap-6 text-[10px] font-black uppercase text-gray-400 tracking-widest">
                <a href="../index.html" class="hover:text-black transition-colors">Wall Art</a>
                <a href="banners.html" class="text-black border-b-2 border-black pb-1">Banners</a>
                <a href="#" class="hover:text-black transition-colors">Trade Show</a>
                <a href="#" class="hover:text-black transition-colors">Decals</a>
                <a href="../Stickers/stickers.html" class="hover:text-black font-bold transition-colors">Stickers</a>
                <a href="#" class="hover:text-black transition-colors">Apparel</a>
                <a href="#" class="hover:text-black transition-colors">Marketing Materials</a>
            </div>
        </div>
        <button class="bg-red-600 text-white px-6 py-2 rounded-full font-black uppercase text-[10px] tracking-widest shadow-lg">Register</button>
    </nav>

    <div class="flex flex-row flex-grow w-full">
        <aside class="sidebar-fixed p-10 hidden lg:block">
            <h3 class="text-[10px] font-black uppercase mb-10 text-gray-300 tracking-[0.2em] border-b pb-4">Product Categories</h3>
            <ul class="space-y-6">
                <li class="sidebar-item cursor-pointer"><a href="../AdvertisingFlags/advertising-flags.html" class="block w-full">Advertising Flags</a></li>
                <li class="sidebar-item cursor-pointer active"><a href="banners.html" class="block w-full">Banners</a></li>
                <li class="sidebar-item cursor-pointer">Displays</li>
                <li class="sidebar-item cursor-pointer">Large Format Printing</li>
                <li class="sidebar-item cursor-pointer">Printed Fabric</li>
                <li class="sidebar-item cursor-pointer"><a href="../Stickers/stickers.html" class="block w-full">Stickers</a></li>
                <li class="sidebar-item cursor-pointer">Rigid Signs</li>
            </ul>
        </aside>

        <main class="main-content-scroll">
            <div class="p-12 flex-grow">
                <header class="mb-12 flex flex-col md:flex-row justify-between items-end gap-6">
                    <div>
                        <h1 class="text-5xl heavy-italic text-gray-900 mb-4">Vinyl & Fabric Banners</h1>
                        <div class="h-2 w-24 bg-black rounded-full"></div>
                    </div>
                    
                    <div class="flex gap-2 bg-white p-1.5 rounded-full border shadow-sm">
                        <button onclick="applySort('random', this)" class="filter-btn active px-6 py-2 rounded-full text-[10px] font-black uppercase tracking-widest">Featured</button>
                        <button onclick="applySort('low', this)" class="filter-btn px-6 py-2 rounded-full text-[10px] font-black uppercase tracking-widest">Price ↓</button>
                        <button onclick="applySort('high', this)" class="filter-btn px-6 py-2 rounded-full text-[10px] font-black uppercase tracking-widest">Price ↑</button>
                    </div>
                </header>

                <div id="banner-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-10">
                    </div>
            </div>

            <footer class="bg-white border-t py-12 px-10 text-center w-full">
                <div class="bg-black p-2 rounded-lg inline-block mb-4 shadow-lg">
                    <img src="../images/SquareFootPrinting-Logo-White-Text-Lrg-01-e1525129997491.jpg" alt="Logo" class="h-6 w-auto">
                </div>
                <p class="text-[9px] font-black text-gray-300 uppercase tracking-[0.3em]">© 2026 Square Foot Printing - Las Vegas</p>
            </footer>
        </main>
    </div>

    <script>
        // Listado de Banners con descripciones y precios reales
        const banners = [
            { name: '13oz Standard Banner', priceVal: 1.00, priceStr: '$1.00 - $3.00 sq/ft', img: '../images/Banners/AMS-Banner2..png', desc: 'Durable vinyl for indoor and outdoor use.' },
            { name: '13oz Super Smooth Banner', priceVal: 1.25, priceStr: '$1.25 sq/ft', img: '../images/Banners/AMS-Banner4..png', desc: 'Premium reinforced vinyl for high durability.' },
            { name: '10oz Mesh Banner', priceVal: 2.00, priceStr: '$2.00 sq/ft', img: '../images/Banners/AMS-Mesh-Banner-01.png', desc: 'Perforated material for windy conditions.' },
            { name: 'Wrinkle Free Fabric', priceVal: 3.00, priceStr: '$3.00 - $5.00 sq/ft', img: '../images/Banners/AMS-Fabric-6.png', desc: 'Polyester fabric with matte finishing.' },
            { name: '18oz HD Banner', priceVal: 3.00, priceStr: '$3.00 sq/ft', img: '../images/Banners/AMS-Banner2..png', desc: 'Heavy duty, smooth blockout vinyl.' },
            { name: 'Tension Fabric', priceVal: 6.00, priceStr: '$6.00 - $10.00 sq/ft', img: '../images/Banners/TensionFabric-3.png', desc: 'Elastic fabric for trade show displays.' },
            { name: 'Blockout Fabric', priceVal: 6.75, priceStr: '$6.75 - $11.25 sq/ft', img: '../images/Banners/BlockOutFabric-1.png', desc: 'Opaque fabric prevents light pass-through.' },
            { name: 'Pole Banners', priceVal: 39.34, priceStr: '$39.34 - $171.66 / unit', img: '../images/Banners/Pole-Banner-04.png', desc: 'Double sided street and parking banners.' }
        ];

        function renderBanners(data) {
            const grid = document.getElementById('banner-grid');
            grid.innerHTML = data.map(b => `
                <div onclick="navigateToProduct('${b.name}')" class="product-card bg-white overflow-hidden cursor-pointer group shadow-sm border border-gray-100">
                    <div class="h-80 p-10 flex items-center justify-center group-hover:bg-gray-50 transition-colors">
                        <img src="${b.img}" alt="${b.name}" class="object-contain h-full drop-shadow-xl transition-transform group-hover:scale-110">
                    </div>
                    <div class="p-8 border-t">
                        <h3 class="font-black text-xl text-gray-800 uppercase italic leading-tight">${b.name}</h3>
                        <p class="text-[11px] text-gray-400 font-bold mt-2 uppercase tracking-tight">${b.desc}</p>
                        <div class="flex justify-between items-end mt-8">
                            <div>
                                <p class="text-[9px] text-gray-400 font-black uppercase tracking-widest">Price starts at</p>
                                <p class="text-2xl font-black text-gray-900 italic leading-none">${b.priceStr}</p>
                            </div>
                            <div class="bg-black text-white px-6 py-2 rounded-full group-hover:bg-red-600 transition-colors italic text-[10px] uppercase font-bold tracking-widest shadow-lg">Select</div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Lógica de navegación mejorada
        function navigateToProduct(name) {
            // Ejemplo de mapeo a páginas específicas si decides crearlas
            if (name === '13oz Standard Banner') {
                window.location.href = 'standard-banner.html';
            } else if (name === '13oz Super Smooth Banner') {
                window.location.href = 'smooth-banner.html';
            } else if (name === '10oz Mesh Banner') {
                window.location.href = 'mesh-banner.html';
            } else if (name === 'Wrinkle Free Fabric') {
                window.location.href = 'fabric-banner.html';
            } else if (name === '18oz HD Banner') {
                window.location.href = 'hdbanner.html';
            } else if (name === 'Tension Fabric') {
                window.location.href = 'tensionfabric.html';
            } else if (name === 'Blockout Fabric') {
                window.location.href = 'blockoutFabric.html';
            } else if (name === 'Pole Banners') {
                window.location.href = 'pole-banners.html';
            } else {
                console.log("Configurando " + name);
                // Por ahora, podrías mandar a una página genérica de contacto o detalles
                // window.location.href = 'product-configurator.html?item=' + encodeURIComponent(name);
            }
        }

        function applySort(type, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            let sorted;
            if (type === 'low') sorted = [...banners].sort((a, b) => a.priceVal - b.priceVal);
            else if (type === 'high') sorted = [...banners].sort((a, b) => b.priceVal - a.priceVal);
            else sorted = [...banners].sort(() => 0.5 - Math.random());
            renderBanners(sorted);
        }

        window.onload = () => applySort('random', document.querySelector('.filter-btn'));
    </script>
</body>
</html>
