<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Square Foot - Live Editor Ultra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fff; overflow-x: hidden; }
        .heavy-italic { font-weight: 900; font-style: italic; text-transform: uppercase; letter-spacing: -0.05em; }
        
        /* Editor Styles */
        .bg-grid {
            background-color: #f9fafb;
            background-image: radial-gradient(#e5e7eb 1.5px, transparent 1.5px);
            background-size: 30px 30px;
        }

        .preview-container {
            display: flex; align-items: center; justify-content: center;
            width: 100%; height: 100%; padding: 60px; position: relative;
        }

        .sticker-wrapper { position: relative; display: flex; align-items: center; justify-content: center; z-index: 10; }
        .sticker-box {
            position: relative; display: flex; align-items: center; justify-content: center;
            background: white; transition: all 0.3s ease; overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
        }

        .cut-line-overlay { position: absolute; inset: -1px; border: 1px solid #ff00ff; pointer-events: none; z-index: 30; }
        #sticker-canvas { width: 100%; height: 100%; object-fit: contain; display: block; z-index: 20; }
        .shape-contour { background: transparent !important; overflow: visible !important; box-shadow: none !important; }
        
        :root { --offset-size: 10px; }
        .contour-filter {
            filter: 
                drop-shadow(var(--offset-size) 0 0 white) drop-shadow(calc(var(--offset-size) * -1) 0 0 white) 
                drop-shadow(0 var(--offset-size) 0 white) drop-shadow(0 calc(var(--offset-size) * -1) 0 white)
                drop-shadow(1px 0 0 #ff00ff) drop-shadow(-1px 0 0 #ff00ff) 
                drop-shadow(0 1px 0 #ff00ff) drop-shadow(0 -1px 0 #ff00ff);
        }

        .measure-label {
            position: absolute; background: #000; color: #fff; padding: 4px 10px;
            font-size: 11px; font-weight: 900; border-radius: 6px; white-space: nowrap;
            z-index: 100; text-transform: uppercase; italic;
        }
        .label-width { bottom: -40px; left: 50%; transform: translateX(-50%); }
        .label-height { right: -80px; top: 50%; transform: translateY(-50%) rotate(90deg); }

        /* Cart Styles */
        #cart-sidebar { position: fixed; top: 0; right: 0; height: 100%; width: 100%; max-width: 450px; background: white; box-shadow: -10px 0 30px rgba(0,0,0,0.1); transform: translateX(100%); transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); z-index: 100; display: flex; flex-direction: column; }
        #cart-sidebar.open { transform: translateX(0); }
        #cart-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); z-index: 90; opacity: 0; pointer-events: none; transition: opacity 0.5s ease; }
        #cart-overlay.visible { opacity: 1; pointer-events: auto; }
    </style>
</head>
<body class="bg-white text-black">

    <nav class="border-b py-4 px-6 md:px-10 flex justify-between items-center sticky top-0 bg-white/95 backdrop-blur-md z-50 shadow-sm text-black">
        <div class="flex items-center gap-8">
            <a href="index.html" class="flex items-center group">
                <div class="bg-black p-2 rounded-lg shadow-xl transition-transform group-hover:scale-105">
                    <img src="images/SquareFootPrinting-Logo-White-Text-Lrg-01-e1525129997491.jpg" alt="Logo" class="h-8 md:h-10 w-auto object-contain">
                </div>
            </a>
            <div class="hidden xl:flex gap-6 text-[10px] font-black uppercase text-gray-400 tracking-widest italic">
                <span class="text-black border-b-2 border-black pb-1">Live Editor</span>
                <a href="Stickers/stickers.html" class="hover:text-black transition-colors">Back to Configurator</a>
            </div>
        </div>
        <div class="flex gap-4 items-center">
            <button onclick="toggleCart()" class="relative text-gray-400 hover:text-black transition-colors p-2 mr-2">
                <i data-lucide="shopping-bag" class="w-6 h-6 text-black"></i>
                <span id="cart-dot" class="absolute top-1 right-1 w-2.5 h-2.5 bg-red-600 rounded-full border-2 border-white hidden"></span>
            </button>
            <button class="bg-black text-white px-6 py-2 rounded-full font-black uppercase text-[10px] tracking-widest italic hover:bg-red-600 transition-all">Review Order</button>
        </div>
    </nav>

    <div class="flex h-[calc(100vh-160px)]">
        <main class="flex-grow bg-grid relative overflow-hidden flex items-center justify-center">
            <div class="preview-container">
                <div class="sticker-wrapper" id="master-wrapper">
                    <div class="sticker-box" id="main-box">
                        <div class="cut-line-overlay" id="geom-line"></div>
                        <canvas id="sticker-canvas"></canvas>
                    </div>
                    <div class="measure-label label-width"><span id="live-w">0</span> <span>in</span></div>
                    <div class="measure-label label-height"><span id="live-h">0</span> <span>in</span></div>
                </div>
            </div>
        </main>

        <aside class="w-96 bg-white border-l p-8 overflow-y-auto flex flex-col justify-between shadow-xl">
            <div class="space-y-8">
                <header>
                    <h2 class="text-2xl heavy-italic tracking-tighter">Adjust Artwork</h2>
                    <div class="h-1.5 w-16 bg-black rounded-full mt-2"></div>
                </header>

                <div class="space-y-3 bg-gray-50 p-5 rounded-3xl border border-gray-100 text-[10px] font-black italic uppercase text-gray-400">
                    <div class="flex justify-between border-b border-gray-200 pb-2">
                        <span>Shape</span> <span id="summary-shape" class="text-black">...</span>
                    </div>
                    <div class="flex justify-between border-b border-gray-200 pb-2">
                        <span>Size</span> <span id="summary-size" class="text-black">0x0 IN</span>
                    </div>
                    <div class="flex justify-between">
                        <span>Min. Price</span> <span class="text-black">$15.00</span>
                    </div>
                </div>

                <div id="offset-panel" class="hidden space-y-4 bg-gray-50 p-6 rounded-3xl border border-gray-100">
                    <div class="flex justify-between uppercase text-[10px] font-black">
                        <span>White Border Offset</span>
                        <span id="val-offset" class="text-black">10px</span>
                    </div>
                    <input type="range" id="input-offset" min="0" max="30" step="1" value="10" class="w-full accent-black" oninput="updateOffset(this.value)">
                </div>

                <div class="space-y-6">
                    <div>
                        <div class="flex justify-between mb-2 uppercase text-[10px] font-bold text-gray-400">
                            <label>Scale Width</label>
                            <span class="text-black font-black" id="val-w">0</span>
                        </div>
                        <input type="range" id="input-w-range" min="1" max="12" step="0.1" class="w-full accent-black cursor-pointer" oninput="updateDimensions()">
                    </div>
                    <div>
                        <div class="flex justify-between mb-2 uppercase text-[10px] font-bold text-gray-400">
                            <label>Scale Height</label>
                            <span class="text-black font-black" id="val-h">0</span>
                        </div>
                        <input type="range" id="input-h-range" min="1" max="12" step="0.1" class="w-full accent-black cursor-pointer" oninput="updateDimensions()">
                    </div>
                    <button onclick="resetDimensions()" class="w-full py-3 border border-gray-200 rounded-xl font-black text-[9px] uppercase hover:bg-gray-50 transition-all tracking-widest">Reset Original Size</button>
                </div>
            </div>

            <div class="pt-8 border-t border-gray-100">
                <div class="flex justify-between items-end mb-6">
                    <span class="text-[10px] font-black uppercase text-gray-400 italic">Total Est.</span>
                    <p id="price-display" class="text-4xl heavy-italic tracking-tighter leading-none">$0.00</p>
                </div>
                <button onclick="addToCartAndStay()" class="w-full bg-black hover:bg-red-600 text-white py-5 rounded-[2rem] font-black uppercase text-xs tracking-[0.2em] italic shadow-2xl transition-all">
                    Add to Cart & Continue
                </button>
            </div>
        </aside>
    </div>

    <footer class="bg-white border-t py-8 px-10 text-center w-full">
        <p class="text-[9px] font-black text-gray-300 uppercase tracking-[0.4em]">© 2026 Square Foot Printing - Production Environment</p>
    </footer>

    <div id="cart-sidebar">
        <div class="p-8 border-b flex justify-between items-center bg-white sticky top-0">
            <div>
                <h3 class="text-2xl heavy-italic tracking-tighter">Your Bag</h3>
                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mt-1" id="cart-count-text">0 Items</p>
            </div>
            <button onclick="toggleCart()" class="p-3 hover:bg-gray-50 rounded-2xl border border-gray-100"><i data-lucide="x" class="w-6 h-6"></i></button>
        </div>
        <div id="cart-items-container" class="flex-grow overflow-y-auto p-8 space-y-8 bg-white"></div>
        <div class="p-8 bg-gray-50 border-t space-y-6">
            <div class="flex justify-between items-end">
                <span class="text-[10px] font-black uppercase text-gray-400 tracking-[0.2em] mb-1 italic">Total</span>
                <span id="cart-total-price" class="text-4xl heavy-italic tracking-tighter leading-none">$0.00</span>
            </div>
            <button class="w-full bg-black text-white font-black py-6 rounded-[2rem] text-[12px] uppercase tracking-[0.3em] italic hover:bg-red-600 transition-all">Checkout Now</button>
        </div>
    </div>
    <div id="cart-overlay" onclick="toggleCart()"></div>

    <script>
        lucide.createIcons();

        const canvas = document.getElementById('sticker-canvas');
        const ctx = canvas.getContext('2d');
        const mainBox = document.getElementById('main-box');
        const geomLine = document.getElementById('geom-line');
        const offsetPanel = document.getElementById('offset-panel');
        let originalImg = new Image();
        let initialW = 3, initialH = 3, selectedShape = "Contour Cut";

        window.onload = function() {
            const imageData = localStorage.getItem('tempStickerImage');
            selectedShape = localStorage.getItem('selectedShape') || "Contour Cut";
            initialW = parseFloat(localStorage.getItem('initialW')) || 3;
            initialH = parseFloat(localStorage.getItem('initialH')) || 3;

            document.getElementById('summary-shape').innerText = selectedShape;

            if (imageData) {
                originalImg.onload = function() {
                    canvas.width = originalImg.width; canvas.height = originalImg.height;
                    ctx.drawImage(originalImg, 0, 0);
                    
                    if (selectedShape === "Contour Cut") {
                        mainBox.className = "sticker-box shape-contour";
                        canvas.className = "contour-filter";
                        offsetPanel.classList.remove('hidden');
                        geomLine.style.display = "none";
                    } else {
                        geomLine.style.display = "block";
                        if(selectedShape === "Circle") {
                            mainBox.style.borderRadius = "9999px";
                            geomLine.style.borderRadius = "9999px";
                        }
                    }
                    
                    document.getElementById('input-w-range').value = initialW;
                    document.getElementById('input-h-range').value = initialH;
                    updateDimensions();
                    renderCart();
                };
                originalImg.src = imageData;
            }
        };

        function updateOffset(value) {
            document.getElementById('val-offset').innerText = value + 'px';
            document.documentElement.style.setProperty('--offset-size', value + 'px');
        }

        function updateDimensions() {
            const w = parseFloat(document.getElementById('input-w-range').value);
            const h = parseFloat(document.getElementById('input-h-range').value);

            document.getElementById('live-w').innerText = w; 
            document.getElementById('live-h').innerText = h;
            document.getElementById('val-w').innerText = w; 
            document.getElementById('val-h').innerText = h;
            document.getElementById('summary-size').innerText = `${w}x${h} IN`;

            const baseScale = 100; 
            mainBox.style.width = (w * baseScale) + "px";
            mainBox.style.height = (h * baseScale) + "px";

            const price = (w * h * 0.18 * 50).toFixed(2);
            document.getElementById('price-display').innerText = `$${price < 15 ? "15.00" : price}`;
        }

        function resetDimensions() {
            document.getElementById('input-w-range').value = initialW;
            document.getElementById('input-h-range').value = initialH;
            updateDimensions();
        }

        // --- LÓGICA DEL CARRITO ---
        function toggleCart() {
            document.getElementById('cart-sidebar').classList.toggle('open');
            document.getElementById('cart-overlay').classList.toggle('visible');
        }

        function renderCart() {
            const cart = JSON.parse(localStorage.getItem('sqft_cart')) || [];
            const container = document.getElementById('cart-items-container');
            const dot = document.getElementById('cart-dot');
            container.innerHTML = cart.length === 0 ? '<div class="text-center py-10 text-gray-300 font-black uppercase italic text-[10px]">Empty</div>' : '';
            
            let total = 0;
            cart.forEach((item, i) => {
                const price = typeof item.price === 'string' ? parseFloat(item.price.replace(/[$,]/g, '')) : item.price;
                total += price;
                container.innerHTML += `
                    <div class="flex gap-4 border-b pb-4">
                        <div class="w-16 h-16 bg-gray-50 rounded-xl border flex items-center justify-center p-1">
                            <img src="${item.image}" class="max-h-full object-contain">
                        </div>
                        <div class="flex-grow">
                            <div class="flex justify-between items-start">
                                <h4 class="text-[11px] font-black uppercase italic">${item.name}</h4>
                                <button onclick="removeItem(${i})"><i data-lucide="trash-2" class="w-3 h-3"></i></button>
                            </div>
                            <p class="text-[8px] text-gray-400 font-bold uppercase">${item.specs || ""}</p>
                            <div class="flex justify-between items-end mt-2">
                                <span class="text-xs font-black italic">$${price.toFixed(2)}</span>
                            </div>
                        </div>
                    </div>`;
            });
            document.getElementById('cart-total-price').innerText = `$${total.toFixed(2)}`;
            document.getElementById('cart-count-text').innerText = `${cart.length} Items`;
            cart.length > 0 ? dot.classList.remove('hidden') : dot.classList.add('hidden');
            lucide.createIcons();
        }

        function removeItem(i) {
            let cart = JSON.parse(localStorage.getItem('sqft_cart')) || [];
            cart.splice(i, 1);
            localStorage.setItem('sqft_cart', JSON.stringify(cart));
            renderCart();
        }

        function addToCartAndStay() {
            const cart = JSON.parse(localStorage.getItem('sqft_cart')) || [];
            const w = document.getElementById('live-w').innerText;
            const h = document.getElementById('live-h').innerText;
            const price = document.getElementById('price-display').innerText;

            cart.push({
                name: "Custom Sticker",
                image: originalImg.src,
                price: price,
                specs: `${selectedShape} | ${w}x${h} in`,
                quantity: 50
            });

            localStorage.setItem('sqft_cart', JSON.stringify(cart));
            renderCart();
            toggleCart();
        }
    </script>
</body>
</html>
