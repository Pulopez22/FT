<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Square Foot - Live Editor Ultra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; overflow: hidden; height: 100vh; }
        :root { --offset-size: 10px; }

        .bg-grid {
            background-color: #e5e7eb;
            background-image: radial-gradient(#d1d5db 1.5px, transparent 1.5px);
            background-size: 30px 30px;
        }

        .preview-container {
            display: flex; align-items: center; justify-content: center;
            width: 100%; height: 100%; padding: 120px; position: relative;
        }

        /* Contenedor Maestro para que las medidas NO se recorten */
        .sticker-wrapper {
            position: relative; display: flex; align-items: center; justify-content: center;
            z-index: 10;
        }

        .sticker-box {
            position: relative; display: flex; align-items: center; justify-content: center;
            background: white; transition: all 0.3s ease; overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
        }

        .cut-line-overlay {
            position: absolute; inset: -1px;
            border: 1px solid #ff00ff; pointer-events: none; z-index: 30;
        }

        #sticker-canvas { width: 100%; height: 100%; object-fit: contain; display: block; z-index: 20; }

        .shape-contour { background: transparent !important; overflow: visible !important; box-shadow: none !important; }
        
        .contour-filter {
            filter: 
                drop-shadow(var(--offset-size) 0 0 white) drop-shadow(calc(var(--offset-size) * -1) 0 0 white) 
                drop-shadow(0 var(--offset-size) 0 white) drop-shadow(0 calc(var(--offset-size) * -1) 0 white)
                drop-shadow(1px 0 0 #ff00ff) drop-shadow(-1px 0 0 #ff00ff) 
                drop-shadow(0 1px 0 #ff00ff) drop-shadow(0 -1px 0 #ff00ff);
        }

        /* ETIQUETAS DE MEDIDA (Fuera del recorte) */
        .measure-label {
            position: absolute; background: #000; color: #fbbf24; padding: 6px 14px;
            font-size: 13px; font-weight: 900; border-radius: 8px; white-space: nowrap;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4); border: 2px solid #fbbf24; z-index: 100;
        }
        .label-width { bottom: -60px; left: 50%; transform: translateX(-50%); }
        .label-height { right: -120px; top: 50%; transform: translateY(-50%) rotate(90deg); }
    </style>
</head>
<body class="flex flex-col">

    <nav class="bg-white border-b py-4 px-10 flex justify-between items-center shadow-sm z-50">
        <div class="text-xl font-black italic uppercase italic">Square Foot <span class="text-yellow-500">Live Editor</span></div>
        <button class="bg-black text-white px-8 py-2 rounded-lg font-bold uppercase text-sm">Done</button>
    </nav>

    <div class="flex-grow flex flex-col lg:flex-row overflow-hidden">
        <div class="lg:w-3/4 bg-grid flex items-center justify-center relative overflow-hidden">
            <div class="preview-container">
                <div class="sticker-wrapper" id="master-wrapper">
                    <div class="sticker-box" id="main-box">
                        <div class="cut-line-overlay" id="geom-line"></div>
                        <canvas id="sticker-canvas"></canvas>
                    </div>
                    <div class="measure-label label-width"><span id="live-w">0</span> <span>in</span></div>
                    <div class="measure-label label-height"><span id="live-h">0</span> <span>in</span></div>
                </div>
            </div>
        </div>

        <div class="lg:w-1/4 bg-white p-8 border-l shadow-2xl flex flex-col justify-between overflow-y-auto text-gray-800">
            <div class="space-y-8">
                <h2 class="text-xl font-black uppercase italic border-b pb-4">Settings</h2>
                
                <div class="space-y-3 bg-gray-50 p-5 rounded-3xl border border-gray-200 text-[10px] font-black italic shadow-sm uppercase text-gray-400">
                    <div class="flex justify-between border-b pb-2">
                        <span>Base Shape</span>
                        <span id="summary-shape" class="text-gray-800">...</span>
                    </div>
                    <div class="flex justify-between border-b pb-2">
                        <span>Current Size</span>
                        <span id="summary-size" class="text-gray-800">0x0 IN</span>
                    </div>
                    <div class="flex justify-between">
                        <span>Quantity</span>
                        <span class="text-gray-800">50 PIECES</span>
                    </div>
                </div>

                <div id="offset-panel" class="hidden space-y-4 bg-pink-50 p-6 rounded-3xl border border-pink-100 shadow-sm">
                    <div class="flex justify-between uppercase text-[10px] font-black text-pink-700">
                        <span>White Border</span>
                        <span id="val-offset">10px</span>
                    </div>
                    <input type="range" id="input-offset" min="0" max="30" step="1" value="10" class="w-full accent-pink-600" oninput="updateOffset(this.value)">
                </div>

                <div class="space-y-6">
                    <div>
                        <div class="flex justify-between mb-2 uppercase text-[10px] font-bold text-gray-500">
                            <label>Width</label>
                            <span class="text-yellow-600 font-black" id="val-w">0</span>
                        </div>
                        <input type="range" id="input-w-range" min="1" max="12" step="0.1" class="w-full accent-black cursor-pointer" oninput="updateDimensions()">
                    </div>
                    <div>
                        <div class="flex justify-between mb-2 uppercase text-[10px] font-bold text-gray-500">
                            <label>Height</label>
                            <span class="text-yellow-600 font-black" id="val-h">0</span>
                        </div>
                        <input type="range" id="input-h-range" min="1" max="12" step="0.1" class="w-full accent-black cursor-pointer" oninput="updateDimensions()">
                    </div>
                    <button onclick="resetDimensions()" class="w-full mt-2 py-3 border-2 border-gray-100 text-gray-400 rounded-xl font-bold text-[10px] uppercase hover:text-black transition-all">Reset Size</button>
                </div>
            </div>

            <div class="pt-8 border-t-4 border-gray-50">
                <p id="price-display" class="text-5xl font-black tracking-tighter mb-4">$0.00</p>
                <button class="w-full bg-black text-white py-5 rounded-2xl font-black uppercase text-sm tracking-widest shadow-xl">Add to Cart</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('sticker-canvas');
        const ctx = canvas.getContext('2d');
        const mainBox = document.getElementById('main-box');
        const geomLine = document.getElementById('geom-line');
        const offsetPanel = document.getElementById('offset-panel');
        let originalImg = new Image();
        let initialW = 3, initialH = 3, selectedShape = "Contour Cut";

        window.onload = function() {
            const imageData = localStorage.getItem('tempStickerImage');
            selectedShape = localStorage.getItem('selectedShape') || "Contour Cut";
            initialW = localStorage.getItem('initialW') || 3;
            initialH = localStorage.getItem('initialH') || 3;

            document.getElementById('summary-shape').innerText = selectedShape;

            if (imageData) {
                originalImg.onload = function() {
                    canvas.width = originalImg.width; canvas.height = originalImg.height;
                    ctx.drawImage(originalImg, 0, 0);
                    
                    if (selectedShape === "Contour Cut") {
                        mainBox.className = "sticker-box shape-contour";
                        canvas.className = "contour-filter";
                        offsetPanel.classList.remove('hidden');
                        geomLine.style.display = "none";
                    } else {
                        geomLine.style.display = "block";
                    }
                    
                    document.getElementById('input-w-range').value = initialW;
                    document.getElementById('input-h-range').value = initialH;
                    updateDimensions();
                };
                originalImg.src = imageData;
            }
        };

        function updateOffset(value) {
            document.getElementById('val-offset').innerText = value + 'px';
            document.documentElement.style.setProperty('--offset-size', value + 'px');
        }

        function updateDimensions() {
            const w = parseFloat(document.getElementById('input-w-range').value);
            const h = parseFloat(document.getElementById('input-h-range').value);

            if (selectedShape !== "Contour Cut") {
                if (selectedShape === "Circle") {
                    // Si son iguales, forzamos círculo perfecto. Si no, óvalo.
                    const radius = (w === h) ? "9999px" : "50%";
                    mainBox.style.borderRadius = radius;
                    geomLine.style.borderRadius = radius;
                } else if (selectedShape === "Square") {
                    mainBox.style.borderRadius = "0px";
                    geomLine.style.borderRadius = "0px";
                } else if (selectedShape === "Rounded Corners") {
                    mainBox.style.borderRadius = "40px";
                    geomLine.style.borderRadius = "40px";
                }
            }

            document.getElementById('live-w').innerText = w; 
            document.getElementById('live-h').innerText = h;
            document.getElementById('val-w').innerText = w; 
            document.getElementById('val-h').innerText = h;
            document.getElementById('summary-size').innerText = `${w}x${h} IN`;

            const baseScale = 150; 
            mainBox.style.width = (w * baseScale) + "px";
            mainBox.style.height = (h * baseScale) + "px";

            const price = (w * h * 0.18 * 50).toFixed(2);
            document.getElementById('price-display').innerText = `$${price < 15 ? "15.00" : price}`;
        }

        function resetDimensions() {
            document.getElementById('input-w-range').value = initialW;
            document.getElementById('input-h-range').value = initialH;
            updateDimensions();
        }
    </script>
</body>
</html>
